version: 2

global:
  server_name: benchmark.local
  private_key: matrix_key.pem
  key_validity_period: 168h0m0s
  database:
    connection_string: postgresql://dendrite:dendrite@postgres/dendrite?sslmode=disable
    max_open_conns: 90
    max_idle_conns: 5
    conn_max_lifetime: -1
  cache:
    max_size_estimated: 1gb
    max_age: 1h
  disable_federation: true
  presence:
    enable_inbound: false
    enable_outbound: false
  report_stats:
    enabled: false
  jetstream:
    storage_path: /var/dendrite/jetstream
    topic_prefix: Dendrite
  metrics:
    enabled: false

client_api:
  registration_disabled: false
  guests_disabled: false
  registration_shared_secret: "benchmarksecret"
  enable_registration_captcha: false
  rate_limiting:
    enabled: false

media_api:
  base_path: /var/dendrite/media
  max_file_size_bytes: 10485760
  dynamic_thumbnails: false

sync_api:
  search:
    enabled: false

user_api:
  bcrypt_cost: 4

logging:
  - type: std
    level: warn
