services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: matrix
      POSTGRES_PASSWORD: matrix
      POSTGRES_DB: matrix
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matrix"]
      interval: 2s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  homeserver:
    build:
      context: ../../upstream/matrix-server-node
    ports:
      - "8008:8008"
    environment:
      SERVER_NAME: benchmark.local
      STORAGE: postgres
      DATABASE_URL: postgres://matrix:matrix@postgres/matrix
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
