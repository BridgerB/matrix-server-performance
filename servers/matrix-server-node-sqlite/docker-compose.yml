services:
  homeserver:
    build:
      context: ../../upstream/matrix-server-node
    ports:
      - "8008:8008"
    environment:
      SERVER_NAME: benchmark.local
      STORAGE: sqlite
      DATABASE_PATH: /data/matrix.db
    volumes:
      - msn_data:/data
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

volumes:
  msn_data:
